{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa hồ sơ - Vạt Coffee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --brand-brown: #5d3a2e; }
        body { background-color: #f5f2ef; font-family: 'Quicksand', sans-serif; padding-top: 50px; }
        .profile-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(93, 58, 46, 0.1); max-width: 600px; margin: auto; }
        .avatar-preview { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid var(--brand-brown); margin-bottom: 20px; }
        .btn-brown { background-color: var(--brand-brown); color: white; border-radius: 20px; padding: 10px 30px; border: none; }
        .btn-brown:hover { background-color: #4a2e25; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <h3 class="fw-bold mb-4" style="color: var(--brand-brown);">Chỉnh sửa hồ sơ</h3>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="text-center">
                <img src="{{ user.avatar.url }}" class="avatar-preview" alt="Avatar">
                <div class="mb-3">
                    <label class="form-label fw-bold">Thay đổi ảnh đại diện</label>
                    {{ u_form.avatar }}
                </div>
            </div>

            <hr>

            <div class="mb-3">
                <label class="form-label fw-bold">Tên đăng nhập</label>
                {{ u_form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Tên hiển thị</label>
                {{ u_form.first_name }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                {{ u_form.email }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Số điện thoại</label>
                {{ u_form.phone }}
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-brown">Lưu thay đổi</button>
                <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill">Quay lại trang chủ</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Tự động thêm class Bootstrap cho các input
    document.querySelectorAll('input').forEach(input => {
        if (input.type !== 'file') {
            input.classList.add('form-control');
            input.style.borderRadius = '15px';
        }
    });
</script>
</body>
</html>
