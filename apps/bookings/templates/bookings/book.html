{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận đặt Box</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-brown: #5d3a2e; }
        body { background-color: #e0e0e0; font-family: 'Quicksand', sans-serif; }
        .card { border-radius: 30px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; margin: auto; }
        .header-bg { background-color: var(--brand-brown); color: white; padding: 25px; border-radius: 30px 30px 0 0; text-align: center; }
        .btn-brown { background-color: var(--brand-brown); color: white; border-radius: 15px; border: none; padding: 15px; }
        .btn-light-gray { background-color: #f8f9fa; border-radius: 15px; padding: 15px; text-decoration: none; }
        .input-style { border-radius: 15px; background-color: #f8f9fa; border: none; padding: 15px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card">
        <div class="header-bg">
            <h3 class="fw-bold m-0">Xác nhận đặt Box</h3>
            <p class="m-0 opacity-75">{{ box.name }}</p>
        </div>
        
        <form method="post" class="p-4">
            {% csrf_token %}
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger p-2 small text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
            
            <div class="mb-3">
                <label class="text-muted fw-bold small">BẮT ĐẦU</label>
                <input type="datetime-local" name="start_time" class="form-control input-style" required>
            </div>
            
            <div class="mb-3">
                <label class="text-muted fw-bold small">THỜI LƯỢNG (GIỜ)</label>
                <select name="duration" id="durationSelect" class="form-select input-style">
                    <option value="1">1 Giờ</option>
                    <option value="2">2 Giờ</option>
                    <option value="3">3 Giờ</option>
                    <option value="4">4 Giờ</option>
                    <option value="5">5 Giờ</option>
                </select>
            </div>

            <div class="d-flex justify-content-between align-items-center bg-light p-4 rounded-4 my-4">
                <span class="fw-bold fs-5">Dự kiến:</span>
                <span class="fw-bold fs-3" id="totalPrice" style="color: var(--brand-brown);">0đ</span>
            </div>

            <div class="d-flex gap-2">
                <a href="{% url 'home' %}" class="btn btn-light-gray w-50 fw-bold text-muted text-center">HỦY</a>
                <button type="submit" class="btn btn-brown w-50 fw-bold">Xác nhận đặt</button>
            </div>
        </form>
    </div>
</div>

{{ box.price_per_hour|json_script:"price-data" }}

<script>
    const pricePerHour = JSON.parse(document.getElementById('price-data').textContent);
    const durationSelect = document.getElementById('durationSelect');
    const priceDisplay = document.getElementById('totalPrice');

    function updatePrice() {
        const hours = parseInt(durationSelect.value);
        const total = hours * pricePerHour;
        priceDisplay.innerText = new Intl.NumberFormat('vi-VN').format(total) + "đ";
    }

    durationSelect.addEventListener('change', updatePrice);
    updatePrice(); // Tính toán ngay khi load trang
</script>
</body>
</html>
