<div class="mb-3">
    <label class="form-label">Tên box</label>
    <input type="text" class="form-control" name="name" value="{{ box.name|default:'' }}" required>
</div>
<div class="row">
    <div class="col-md-6 mb-3">
        <label class="form-label">Loại box</label>
        <select class="form-select" name="category">
            <option value="">Chưa phân loại</option>
            {% for category in categories %}
            <option value="{{ category.id }}" {% if box.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-6 mb-3">
        <label class="form-label">Sức chứa</label>
        <input type="number" class="form-control" name="capacity" min="1" value="{{ box.capacity|default:1 }}" required>
    </div>
</div>
<div class="row">
    <div class="col-md-6 mb-3">
        <label class="form-label">Giá/giờ</label>
        <input type="number" class="form-control" name="price_per_hour" min="0" step="1000" value="{{ box.price_per_hour|floatformat:0|default:0 }}" required>
    </div>
    <div class="col-md-6 mb-3">
        <label class="form-label">Trạng thái</label>
        <select class="form-select" name="status">
            <option value="available" {% if box.status == 'available' %}selected{% endif %}>Đang trống</option>
            <option value="pending" {% if box.status == 'pending' %}selected{% endif %}>Chờ phê duyệt</option>
            <option value="confirmed" {% if box.status == 'confirmed' %}selected{% endif %}>Chờ check-in</option>
            <option value="active" {% if box.status == 'active' %}selected{% endif %}>Đang sử dụng</option>
            <option value="completed" {% if box.status == 'completed' %}selected{% endif %}>Đã hoàn thành</option>
        </select>
    </div>
</div>
<div class="mb-3">
    <label class="form-label">Hình ảnh</label>
    <input type="file" class="form-control" name="image" accept="image/*">
    {% if box.image %}<small class="text-muted">Ảnh hiện tại: {{ box.image.name }}</small>{% endif %}
</div>
<div class="mb-3">
    <label class="form-label">Mô tả</label>
    <textarea class="form-control" name="description" rows="3">{{ box.description|default:'' }}</textarea>
</div>
