<div class="mb-3">
    <label class="form-label">Tên sản phẩm</label>
    <input type="text" class="form-control" name="name" value="{{ product.name|default:'' }}" required>
</div>
<div class="row">
    <div class="col-md-6 mb-3">
        <label class="form-label">Giá</label>
        <input type="number" class="form-control" name="price" min="0" step="1000" value="{{ product.price|floatformat:0|default:0 }}" required>
    </div>
    <div class="col-md-6 mb-3">
        <label class="form-label">Tồn kho</label>
        <input type="number" class="form-control" name="stock" min="0" value="{{ product.stock|default:0 }}" required>
    </div>
</div>
<div class="mb-3">
    <label class="form-label">Hình ảnh</label>
    <input type="file" class="form-control" name="image" accept="image/*">
    {% if product.image %}<small class="text-muted">Ảnh hiện tại: {{ product.image.name }}</small>{% endif %}
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="is_active" id="isActive{{ product.id|default:'New' }}" {% if product.is_active or not product %}checked{% endif %}>
    <label class="form-check-label fw-bold" for="isActive{{ product.id|default:'New' }}">Đang kinh doanh</label>
</div>
